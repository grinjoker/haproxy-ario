global
    log stdout format raw local0
    maxconn 45000

    # Performance Tuning for HTTP/2 and TLS
    tune.bufsize 163840
    tune.h2.initial-window-size 1048576

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # Mozilla Intermediate SSL config
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

# ---------------------------------------------------------------------
# DNS RESOLVERS (تعریف ریزالور برای حل زنده دامنه‌ها)
# ---------------------------------------------------------------------
resolvers mydns
    nameserver dns1 8.8.8.8:53
    nameserver dns2 1.1.1.1:53
    resolve_retries 3
    timeout resolve 1s
    hold valid 300s

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  redispatch
    retries 2
    timeout connect 3s
    timeout client  15m
    timeout server  15m
    timeout tunnel  3600s
    timeout http-keep-alive 2m

    # تنظیمات عمومی: سلامت‌سنجی سریع + سوییچ زنده + ریزالور DNS
    default-server inter 3s fall 2 rise 2 on-marked-down shutdown-sessions resolvers mydns resolve-prefer ipv4

frontend stats
    mode http
    bind 92.118.190.125:8404
    stats enable
    stats uri /stats
    stats refresh 10s

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/stream.pem alpn h2,http/1.1
    
    # Routing based on path
    acl is_xhttp path_beg /game/stream/
    acl is_ws path_beg /wp-admin
    
    use_backend xray_xhttp if is_xhttp
    use_backend xray_ws if is_ws
    default_backend nginx_fallback

backend xray_xhttp
    mode http
    balance hash path,field(4,/)
    hash-type consistent
    # proto h2 برای XHTTP الزامی است
    server node1 node1.jokershadow.org:4040 check proto h2
    server node2 node2.jokershadow.org:4040 check proto h2
    server node3 node3.jokershadow.org:4040 check proto h2
    server node4 node4.jokershadow.org:4040 check proto h2

backend xray_ws
    mode http
    balance leastconn
    # WebSocket backend
    server node1 node1.jokershadow.org:5050 check
    server node2 node2.jokershadow.org:5050 check
    server node3 node3.jokershadow.org:5050 check
    server node4 node4.jokershadow.org:5050 check

backend nginx_fallback
    mode http
    server local_nginx 127.0.0.1:8080 check
